# Zelfde venster als backtest_2026_04_full.yaml, data uit Dukascopy-cache
# (vul met: --config configs/data_dukascopy_compare.yaml fetch --source dukascopy).
#
#   python -m src.quantbuild.app --config configs/backtest_2026_04_full_dukascopy.yaml backtest

symbol: XAUUSD
timeframes:
  - 15m
  - 1h

data:
  base_path: data/market_cache_dukascopy

backtest:
  start_date: "2026-04-01"
  end_date: "2026-04-30"
  tp_r: 2.0
  sl_r: 1.0

risk:
  max_daily_loss_r: 3.0

quantlog:
  enabled: false

news:
  enabled: false
