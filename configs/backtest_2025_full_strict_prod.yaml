# Kalenderjaar 2025 met dezelfde SQE/regime/regime_profiles als strict_prod_v2.yaml.
#
# extends laadt configs/strict_prod_v2.yaml; deze file overschrijft alleen het backtest-venster.
#
#   python -m src.quantbuild.app --config configs/backtest_2025_full_strict_prod.yaml backtest

extends: strict_prod_v2.yaml

backtest:
  start_date: "2025-01-01"
  end_date: "2025-12-31"

# Één JSONL-bestand per run onder data/quantlog_events/runs/<run_id>.jsonl
# (geen losse bestanden per kalenderdag).
quantlog:
  consolidated_run_file: true

# QuantOS artifact bundle naar ../quantmetrics_os/runs/<experiment>/<role>/ (QuantBuild hook)
artifacts:
  enabled: false
  experiment_id: "EXP-2025-full"
  role: single
  bundle_analytics: true
  analytics_recent_seconds: 1200
