# QuantBuild live-demo profile using QuantBridge cTrader OpenAPI adapter
symbol: XAUUSD

data:
  source: auto   # strict live source: ctrader only
  base_path: data/market_cache

broker:
  provider: ctrader
  environment: demo
  account_id: ""       # fallback to CTRADER_ACCOUNT_ID
  access_token: ""     # fallback to CTRADER_ACCESS_TOKEN
  client_id: ""        # fallback to CTRADER_CLIENT_ID
  client_secret: ""    # fallback to CTRADER_CLIENT_SECRET
  instrument: XAUUSD
  mock_mode: false

execution:
  check_interval_seconds: 60
  regime_update_seconds: 900

execution_guards:
  max_spread_pips: 4.0
  max_slippage_r: 0.15
  max_open_positions: 3

risk:
  max_position_pct: 1.0
  max_daily_loss_r: 3.0

quantlog:
  enabled: true
  base_path: data/quantlog_events
  environment: live
  # run_id / session_id: weglaten = auto (env QUANTBUILD_RUN_ID / INVOCATION_ID voor run_id)
