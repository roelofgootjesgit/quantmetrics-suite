# ============================================================
# Instrument Execution Profiles — Dual-Book Architecture
# ============================================================
#
# ARCHITECTURE:
#   Book 1 (CORE_PROMOTE) -> Funded survival + stable compounding
#   Book 2 (CHALLENGE_CANDIDATE) -> FTMO pass speed + throughput
#
# CLASSIFICATION:
#   CORE_PROMOTE         = validated edge, challenge + funded
#   CHALLENGE_CANDIDATE  = throughput-viable, challenge only (not funded base book)
#   REGIME_FILTER        = no direct trading edge, used as market state input
#   WATCHLIST            = partial edge, not yet deployable
#   REJECT               = no viable edge
#
# Universal kernel: regime + SQE + news gate + dynamic exits
# Per-instrument: regime gates + execution constraints + portfolio role
#
# Validated by cross_instrument_runner.py + candidate_instrument_test.py
# on 5yr data (2021-2026)
# ============================================================

instruments:

  # ── BOOK 1: CORE QUALITY (funded + challenge) ─────────────

