# ============================================================
# Promotion Rubric Thresholds
# ============================================================
promotion:
  core_promote:
    min_expectancy_r: 0.15
    min_profit_factor: 1.2
    max_drawdown_r: -35
    min_trades: 50
    min_rdd: 1.0
    dynamic_exit_improvement: true
  challenge_candidate:
    min_expectancy_r: 0.05
    min_profit_factor: 1.05
    min_trades: 100
    min_rdd: 0.5
    _notes: "Lower bar than core, but must provide meaningful trade frequency"
  watchlist:
    min_expectancy_r: 0.05
    min_profit_factor: 1.0
    max_drawdown_r: -50
    min_trades: 30

# ============================================================
# Dual-Book Trading Modes
# ============================================================
modes:

  challenge:
    description: "FTMO Challenge — Core + Throughput book"
    target_pct: 10.0
    max_daily_loss_pct: 5.0
    max_total_dd_pct: 10.0
    risk_per_trade_pct: 1.5
    max_portfolio_heat_pct: 6.0
    max_correlated_exposure: 2
    books: ["core", "throughput"]
    core_instruments: ["XAUUSD", "GBPUSD", "USDJPY", "USDCHF", "NZDUSD"]
    throughput_instruments: ["NAS100"]

  funded:
    description: "Funded Account — Core book only, capital preservation"
    target_pct_monthly: 4.0
    max_daily_loss_pct: 2.0
    max_total_dd_pct: 6.0
    risk_per_trade_pct: 0.75
    max_portfolio_heat_pct: 3.0
    max_correlated_exposure: 2
    books: ["core"]
    core_instruments: ["XAUUSD", "GBPUSD", "USDJPY", "USDCHF", "NZDUSD"]
    throughput_instruments: []

