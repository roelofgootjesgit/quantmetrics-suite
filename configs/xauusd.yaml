# Quantbuild E1 — XAUUSD Base Profile
symbol: XAUUSD
timeframes:
  - 15m
  - 1h

backtest:
  default_period_days: 365
  tp_r: 2.0
  sl_r: 1.0
  session_filter: null
  session_mode: extended

risk:
  max_position_pct: 0.015
  max_daily_loss_r: 2.5
  max_concurrent_positions: 3
  equity_kill_switch_pct: 10.0
  risk_pct_per_r: 0.01

strategy:
  name: sqe_xauusd
  trend_context:
    modules:
      - market_structure_shift
      - displacement
    require_all: false
  liquidity_levels:
    modules:
      - liquidity_sweep
      - fair_value_gaps
    require_all: false
  entry_trigger:
    module: displacement
  liquidity_sweep:
    lookback_candles: 20
    sweep_threshold_pct: 0.15
    reversal_candles: 4
  displacement:
    min_body_pct: 60
    min_candles: 2
    min_move_pct: 1.5
  fair_value_gaps:
    min_gap_pct: 0.3
    validity_candles: 80
  market_structure_shift:
    swing_lookback: 5
    break_threshold_pct: 0.15
  order_blocks:
    min_candles: 2
    min_move_pct: 1.5
    validity_candles: 40
  imbalance_zones:
    min_gap_size: 3.0
    validity_candles: 50
  require_structure: true
  structure_use_h1_gate: true
  entry_require_sweep_displacement_fvg: true
  entry_sweep_disp_fvg_lookback_bars: 5
  entry_sweep_disp_fvg_min_count: 2
  structure_context:
    lookback: 30
    pivot_bars: 2

# ---- News Layer (Fase 2+3) ----
news:
  enabled: true
  poll_interval_seconds: 30
  sources:
    rss:
      enabled: true
      feeds:
        - name: "Kitco Gold"
          url: "https://www.kitco.com/rss/gold.xml"
          tier: 1
          category: commodities
        - name: "Reuters Business"
          url: "https://feeds.reuters.com/reuters/businessNews"
          tier: 1
          category: macro
        - name: "Reuters World"
          url: "https://feeds.reuters.com/reuters/worldNews"
          tier: 2
          category: geopolitics
        - name: "CNBC Economy"
          url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=20910258"
          tier: 2
          category: macro
        - name: "Fed Reserve"
          url: "https://www.federalreserve.gov/feeds/press_all.xml"
          tier: 1
          category: central_banks
        - name: "Bloomberg Markets"
          url: "https://feeds.bloomberg.com/markets/news.rss"
          tier: 1
          category: macro
    newsapi:
      enabled: false
      categories: ["business", "science"]
      language: "en"
  source_tiers:
    tier_1_reliability: 0.95
    tier_2_reliability: 0.80
    tier_3_reliability: 0.55
    tier_4_reliability: 0.25
  filter:
    min_relevance_score: 0.5
    max_age_minutes: 15
    gold_keywords:
      - gold
      - xauusd
      - bullion
      - precious metals
      - safe haven
      - gold price
      - gold futures
    macro_keywords:
      - fed
      - fomc
      - inflation
      - cpi
      - nfp
      - rate cut
      - rate hike
      - dxy
      - dollar
      - treasury
      - yield
    geopolitics_keywords:
      - war
      - sanction
      - conflict
      - military
      - crisis
      - geopolitical
    categories:
      - commodities
      - macro
      - central_banks
      - geopolitics
      - gold
    keywords_whitelist: []
    keywords_blacklist: []
  gate:
    block_minutes_before_high_impact: 30
    block_minutes_after_high_impact: 15
    high_impact_events:
      - NFP
      - FOMC
      - CPI
      - GDP
      - "Interest Rate"
      - "Fed Chair"
  sentiment:
    mode: hybrid
    llm_model: gpt-4o-mini
    boost_threshold: 0.7
    suppress_threshold: 0.3
  counter_news:
    enabled: true
    check_interval_seconds: 60
    exit_threshold: 0.8

# ---- Broker (Fase 4) ----
broker:
  provider: oanda
  environment: practice
  account_id: ""
  token: ""
  instrument: XAU_USD
  initial_balance: 10000
  leverage: 100
  margin_rate: 0.05

# ---- Alerts (Fase 5) ----
monitoring:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    alerts:
      trade_entry: true
      trade_exit: true
      daily_summary: true
      error_alerts: true
      news_event: true
      counter_news: true
  dashboard:
    enabled: false
    host: "0.0.0.0"
    port: 8501

# ---- AI / LLM ----
ai:
  openai_api_key: ""
  model: gpt-4o-mini
  max_tokens: 500
  temperature: 0.2
  timeout_seconds: 15
