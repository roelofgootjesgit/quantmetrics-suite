# ============================================================
# FUNDED MODE — Income Engine
# ============================================================
# Core trend + EURUSD mean reversion
# Conservative risk, capital preservation focus
# NAS100 disabled — stability over throughput
#
# Expected: ~232 trades/yr, +4.0%/mo at 0.5% risk, R/DD 10.4
# ============================================================

mode: "funded"
description: "Funded account — stable compounding, low drawdown"

# ── Data ─────────────────────────────────────────────────────
data:
  base_path: "data/market_cache"
  source: "dukascopy"
  timeframes: ["15m", "1h"]

# ── Strategy ─────────────────────────────────────────────────
strategy:
  liquidity_sweep:
    lookback_candles: 20
    sweep_threshold_pct: 0.2
    reversal_candles: 3
  displacement:
    min_body_pct: 70
    min_candles: 3
    min_move_pct: 1.5
  fair_value_gaps:
    min_gap_pct: 0.5
    validity_candles: 50
  market_structure_shift:
    swing_lookback: 5
    break_threshold_pct: 0.2
  structure_context:
    lookback: 30
    pivot_bars: 2
  order_blocks:
    min_candles: 2
    min_move_pct: 1.5
    validity_candles: 40
  imbalance_zones:
    min_gap_size: 3.0
    validity_candles: 50
  trend_context:
    modules: ["market_structure_shift", "displacement"]
    require_all: false
  liquidity_levels:
    modules: ["liquidity_sweep", "fair_value_gaps"]
    require_all: true
  entry_trigger:
    module: "displacement"
  require_structure: true
  entry_require_sweep_displacement_fvg: true
  entry_sweep_disp_fvg_lookback_bars: 5
  structure_use_h1_gate: true

# ── Regime Detection ─────────────────────────────────────────
regime:
  atr_period: 14
  atr_sma_period: 20
  expansion_threshold: 1.5
  compression_threshold: 0.7
  structure_lookback: 30
  structure_pivot_bars: 2

# ── Risk ─────────────────────────────────────────────────────
risk:
  risk_per_trade_pct: 0.5
  max_daily_loss_r: 4.0
  max_concurrent_positions: 4
  equity_kill_switch_pct: 5.0

# ── Execution Guards ─────────────────────────────────────────
execution_guards:
  max_spread_pips: 4.0
  max_slippage_r: 0.15
  max_open_positions: 4

execution:
  check_interval_seconds: 60
  regime_update_seconds: 900

# ── Adaptive Mode ────────────────────────────────────────────
adaptive_mode:
  aggressive_dd_max: 1.0
  aggressive_momentum_window: 5
  defensive_dd: 2.0
  lockdown_dd: 4.0
  defensive_losing_streak: 3
  lockdown_losing_streak: 5
  recovery_wins: 3

# ── Portfolio Heat ───────────────────────────────────────────
portfolio_heat:
  max_portfolio_heat_pct: 3.0
  max_instrument_heat_pct: 1.5
  max_correlated_exposure: 2
  max_same_direction: 3

# ── Instruments ──────────────────────────────────────────────
instruments:
  XAUUSD:
    enabled: true
    engine: "sqe_trend"
    regimes: { trend: true, expansion: true, compression: false }
    expansion_sessions: ["New York", "Overlap"]
    expansion_min_hour_utc: 10
    risk_multiplier: 1.0
    max_spread_pips: 4.0
    max_concurrent: 2

  GBPUSD:
    enabled: true
    engine: "sqe_trend"
    regimes: { trend: true, expansion: false, compression: false }
    risk_multiplier: 1.0
    max_spread_pips: 2.0
    max_concurrent: 2

  USDJPY:
    enabled: true
    engine: "sqe_trend"
    regimes: { trend: true, expansion: true, compression: false }
    risk_multiplier: 1.0
    max_spread_pips: 1.5
    max_concurrent: 2

  USDCHF:
    enabled: true
    engine: "sqe_trend"
    regimes: { trend: true, expansion: true, compression: false }
    risk_multiplier: 1.0
    max_spread_pips: 1.5
    max_concurrent: 2

  NZDUSD:
    enabled: true
    engine: "sqe_trend"
    regimes: { trend: true, expansion: false, compression: false }
    risk_multiplier: 1.0
    max_spread_pips: 2.0
    max_concurrent: 2

  EURUSD:
    enabled: true
    engine: "mean_reversion"
    regimes: { trend: false, expansion: false, compression: true }
    risk_multiplier: 0.7
    max_spread_pips: 1.5
    max_concurrent: 1
    mr_config:
      tp_r: 1.0
      sl_r: 1.0
      time_stop_bars: 10
      range_lookback: 30
      min_bars_between_trades: 8

  AUDUSD:
    enabled: false
    _notes: "WATCHLIST — slippage fragile, SHORT-only bias, 2024 drawdown"

  USDCAD:
    enabled: false
    _notes: "WATCHLIST — no trend/MR edge yet"

  NAS100:
    enabled: false

# ── Kill Switches ────────────────────────────────────────────
kill_switches:
  max_daily_loss_pct: 2.0
  max_total_dd_pct: 5.0
  consecutive_losing_days_halt: 3
  losing_day_risk_reduction: 0.5

# ── News ─────────────────────────────────────────────────────
news:
  enabled: true
  gate_enabled: true
  block_minutes_before: 30
  block_minutes_after: 15

# ── Alerts ───────────────────────────────────────────────────
alerts:
  telegram:
    enabled: true
    on_trade: true
    on_kill_switch: true
    on_daily_summary: true
