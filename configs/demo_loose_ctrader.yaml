# ============================================================
# DEMO_LOOSE — cTrader + research filters (CREDENTIALS VEREIST)
# ============================================================
# Vereist: CTRADER_ACCOUNT_ID + CTRADER_ACCESS_TOKEN in os.environ. Zie
# docs/CREDENTIALS_AND_ENVIRONMENT.md.
# Zonder credentials: tijdelijk configs/demo_loose_prod_v2.yaml (Oanda-fallback).
#
# Research mode: bewust losser dan strict — meer funnel-events (signal_detected → …).
# - filters.regime: false → LiveRunner zet geen regime_block op compressie (anders zie je vaak no_trade).
# - compression.skip: false + kleinere size → ook bruikbaar als je regime-filter later weer aanzet.
# - strategy: minder entry-gates dan strict (meer kandidaat-signalen; nog steeds position_limit + daily_loss).
# Pair met demo_strict_ctrader.yaml op een tweede deployment.
# ============================================================
# Zelfde strategie/news/execution als strict_prod_v2.yaml, maar broker = cTrader.
#
# Credentials: zelfde CTRADER_* in de OS-omgeving (aanbevolen). Optioneel fallback:
# quantbridgev1/.env bij launch_live_safe — productie: systemd EnvironmentFile.
#
# Vereist: cTrader desktop met je IC Markets-account ingelogd; Open API-app;
# pip install -r requirements.txt in quantbridgev1 (ctrader-open-api).
# Optioneel: QUANTBRIDGE_SRC_PATH=C:/pad/naar/quantbridgev1/src als sibling-pad niet klopt.
#
# Start: quantmetrics.py build -c configs/demo_loose_ctrader.yaml
# API-orders demo-account: quantmetrics.py build --real -c configs/demo_loose_ctrader.yaml
# ============================================================

symbol: XAUUSD
timeframes:
  - 15m
  - 1h

# DRY RUN: LiveRunner roept broker.connect() alleen als source=ctrader (zie live_runner.run).
# Zonder dit blijft de cTrader-verbinding uit tijdens paper mode; orders blijven gesimuleerd.
data:
  base_path: data/market_cache
  source: ctrader
  cache_ttl_hours: 24

backtest:
  default_period_days: 1825
  tp_r: 2.0
  sl_r: 1.0
  session_filter: null
  session_mode: extended

risk:
  max_position_pct: 0.015
  max_daily_loss_r: 2.5
  max_concurrent_positions: 3
  max_trades_per_session: 3
  equity_kill_switch_pct: 10.0
  risk_pct_per_r: 0.01

strategy:
  name: sqe_xauusd
  trend_context:
    modules:
      - market_structure_shift
      - displacement
    require_all: false
  liquidity_levels:
    modules:
      - liquidity_sweep
      - fair_value_gaps
    require_all: false
  entry_trigger:
    module: displacement
  liquidity_sweep:
    lookback_candles: 20
    sweep_threshold_pct: 0.15
    reversal_candles: 4
  displacement:
    min_body_pct: 60
    min_candles: 2
    min_move_pct: 1.5
  fair_value_gaps:
    min_gap_pct: 0.3
    validity_candles: 80
  market_structure_shift:
    swing_lookback: 5
    break_threshold_pct: 0.15
  order_blocks:
    min_candles: 2
    min_move_pct: 1.5
    validity_candles: 40
  imbalance_zones:
    min_gap_size: 3.0
    validity_candles: 50
  require_structure: false
  structure_use_h1_gate: false
  entry_require_sweep_displacement_fvg: false
  entry_sweep_disp_fvg_lookback_bars: 5
  entry_sweep_disp_fvg_min_count: 1
  structure_context:
    lookback: 30
    pivot_bars: 2

regime:
  atr_period: 14
  atr_sma_period: 20
  expansion_threshold: 1.5
  compression_threshold: 0.7
  structure_lookback: 30
  structure_pivot_bars: 2

regime_profiles:
  trend:
    tp_r: 2.0
    sl_r: 1.0
    max_trades_per_session: 3
    position_size_mult: 1.0
    allowed_sessions:
      - London
      - Overlap
      - New York
  expansion:
    tp_r: 2.0
    sl_r: 1.0
    max_trades_per_session: 3
    position_size_mult: 1.0
    allowed_sessions:
      - New York
      - Overlap
    min_hour_utc: 10
  compression:
    skip: false
    tp_r: 2.0
    sl_r: 1.0
    max_trades_per_session: 5
    position_size_mult: 0.5
    allowed_sessions:
      - London
      - Overlap
      - New York
      - Asia

news:
  enabled: true
  poll_interval_seconds: 30
  sources:
    rss:
      enabled: true
      feeds:
        - name: "Kitco Gold"
          url: "https://www.kitco.com/rss/gold.xml"
          tier: 1
          category: commodities
        - name: "Reuters Business"
          url: "https://feeds.reuters.com/reuters/businessNews"
          tier: 1
          category: macro
        - name: "Reuters World"
          url: "https://feeds.reuters.com/reuters/worldNews"
          tier: 2
          category: geopolitics
        - name: "CNBC Economy"
          url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=20910258"
          tier: 2
          category: macro
        - name: "Fed Reserve"
          url: "https://www.federalreserve.gov/feeds/press_all.xml"
          tier: 1
          category: central_banks
        - name: "Bloomberg Markets"
          url: "https://feeds.bloomberg.com/markets/news.rss"
          tier: 1
          category: macro
    finnhub:
      enabled: true
      category: general
      tier: 2
    newsapi:
      enabled: true
      categories: ["business", "science"]
      language: "en"
  source_tiers:
    tier_1_reliability: 0.95
    tier_2_reliability: 0.80
    tier_3_reliability: 0.55
    tier_4_reliability: 0.25
  filter:
    min_relevance_score: 0.62
    max_age_minutes: 10
    gold_keywords:
      - gold
      - xauusd
      - bullion
      - precious metals
      - safe haven
      - gold price
      - gold futures
    macro_keywords:
      - fed
      - fomc
      - inflation
      - cpi
      - nfp
      - rate cut
      - rate hike
      - dxy
      - dollar
      - treasury
      - yield
    geopolitics_keywords:
      - war
      - sanction
      - conflict
      - military
      - crisis
      - geopolitical
    categories:
      - commodities
      - macro
      - central_banks
      - geopolitics
      - gold
    keywords_whitelist: []
    keywords_blacklist: []
  gate:
    block_minutes_before_high_impact: 30
    block_minutes_after_high_impact: 15
    high_impact_events:
      - NFP
      - FOMC
      - CPI
      - GDP
      - "Interest Rate"
      - "Fed Chair"
  sentiment:
    mode: hybrid
    llm_model: gpt-4o-mini
    boost_threshold: 0.75
    suppress_threshold: 0.45
    max_events_per_poll: 12
    max_source_tier_for_llm: 2
    max_event_age_minutes: 20
  advisor:
    enabled: true
    model: gpt-4o-mini
    min_events: 2
    recent_window_minutes: 45
    max_headlines: 8
    block_on_strong_contra: true
    block_confidence: 0.8
    cache_ttl_seconds: 120
    fallback_strong_impact: 0.65
  counter_news:
    enabled: true
    check_interval_seconds: 60
    exit_threshold: 0.8
  telegram:
    enabled: true
    min_abs_impact: 0.45
    max_alerts_per_poll: 3

execution_guards:
  max_spread_pips: 4.0
  max_slippage_r: 0.15
  max_open_positions: 3

execution:
  check_interval_seconds: 60
  regime_update_seconds: 900

# ---- Broker: echte cTrader OpenAPI (IC Markets demo) ----
broker:
  provider: ctrader
  mock_mode: false
  environment: demo
  account_id: ""
  access_token: ""
  client_id: ""
  client_secret: ""
  instrument: XAUUSD
  initial_balance: 10000
  mock_spread: 0.2
  mock_price: 2500.0

monitoring:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    alerts:
      trade_entry: true
      trade_exit: true
      daily_summary: true
      error_alerts: true
      news_event: true
      counter_news: true
      suite_lifecycle: true
  dashboard:
    enabled: false
    host: "0.0.0.0"
    port: 8501

ai:
  openai_api_key: ""
  model: gpt-4o-mini
  max_tokens: 500
  temperature: 0.2
  timeout_seconds: 15

# Standaard alles true; hier expliciet uit voor edge-decompositie
filters:
  regime: false
  session: false
  cooldown: false
  news: false
  spread: false
  position_limit: true
  daily_loss: true
  research_raw_first: true

quantlog:
  enabled: true
  base_path: data/quantlog_events_demo_loose
  run_id: demo_loose
  # environment: weglaten — volgt CLI --dry-run vs --real
