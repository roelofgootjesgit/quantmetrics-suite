version: 1
description: QuantLog v1 canonical event types and required payload keys

event_types:
  signal_evaluated:
    required_payload:
      - signal_type
      - signal_direction
      - confidence
    # Desk-grade upgrade (optional; validated when present). See docs/QUANTBUILD_LOGGING_UPGRADE_DATA_COLLECTION.md
    optional_payload:
      - new_bar_detected
      - bar_ts
      - poll_ts
      - same_bar_guard_triggered
      - same_bar_guard_reason
      - same_bar_skip_count_for_bar
      - previous_eval_stage_on_bar
      - gate_summary
      - blocked_by_primary_gate
      - blocked_by_secondary_gate
      - evaluation_path
      - near_entry_score
      - closest_to_entry_side
      - active_modules_count_long
      - active_modules_count_short
      - missing_modules_long
      - missing_modules_short
      - entry_distance_long
      - entry_distance_short
      - modules_long
      - modules_short
      - combo_active_modules_count_long
      - combo_active_modules_count_short
      - setup_candidate
      - candidate_side
      - candidate_strength
      - candidate_reason
      - entry_ready
      - threshold_snapshot
  risk_guard_decision:
    required_payload:
      - guard_name
      - decision
      - reason
    allowed_decisions:
      - ALLOW
      - BLOCK
      - REDUCE
      - DELAY
  signal_detected:
    required_payload:
      - signal_id
      - type
      - direction
      - strength
      - bar_timestamp
      - session
      - regime
  signal_filtered:
    required_payload:
      - filter_reason
      - raw_reason
    # filter_reason uses the same canonical strings as trade_action NO_ACTION reason.
    filter_reasons_same_as_no_action: true
  trade_action:
    required_payload:
      - decision
      - reason
    allowed_decisions:
      - ENTER
      - EXIT
      - REVERSE
      - NO_ACTION
    # When decision is NO_ACTION, payload.reason must be one of these (snake_case).
    no_action_reasons:
      - no_setup
      - regime_blocked
      - session_blocked
      - risk_blocked
      - spread_too_high
      - news_filter_active
      - position_limit_reached
      - cooldown_active
      - broker_unavailable
      - market_data_unavailable
      - execution_disabled
      - confidence_too_low
  trade_executed:
    required_payload:
      - direction
      - trade_id
    allowed_directions:
      - LONG
      - SHORT
  trade_closed:
    required_payload:
      - trade_id
      - exit_price
      - pnl_r
    optional_payload:
      - order_ref
      - direction
      - pnl_abs
      - mae_r
      - mfe_r
      - outcome
      - session
      - regime
  adaptive_mode_transition:
    required_payload:
      - old_mode
      - new_mode
      - reason
  broker_connect:
    required_payload:
      - broker
      - status
  order_submitted:
    required_payload:
      - order_ref
      - side
      - volume
      - trade_id
  order_filled:
    required_payload:
      - order_ref
      - fill_price
      - trade_id
  order_rejected:
    required_payload:
      - order_ref
      - reason
  governance_state_changed:
    required_payload:
      - account_id
      - old_state
      - new_state
      - reason
  failsafe_pause:
    required_payload:
      - reason
  audit_gap_detected:
    required_payload:
      - source_system
      - gap_start_utc
      - gap_end_utc
      - gap_seconds
      - reason
  market_data_stale_warning:
    required_payload:
      - symbol
      - bar_lag_minutes
      - latest_bar_ts_utc
      - session
      - threshold_minutes
