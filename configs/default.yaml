# Quantbuild E1 v1 — Default Configuration

symbol: XAUUSD
timeframes:
  - 15m
  - 1h

data:
  base_path: data/market_cache
  source: auto   # auto | ctrader | dukascopy | yfinance
  cache_ttl_hours: 24

backtest:
  default_period_days: 60
  tp_r: 2.0
  sl_r: 1.0

risk:
  max_position_pct: 0.02
  max_daily_loss_r: 3.0

broker:
  provider: ctrader
  environment: demo
  account_id: ""
  access_token: ""
  instrument: XAUUSD
  mock_mode: true
  mock_spread: 0.2
  mock_price: 2500.0
  initial_balance: 10000

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: logs/quantbuild.log

quantlog:
  enabled: false
  base_path: data/quantlog_events
  environment: dry_run
  # run_id / session_id: weglaten voor auto (nooit lege string — correlatie P1).

monitoring:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    alerts:
      trade_entry: true
      trade_exit: true
      daily_summary: true
      status_report: true
      error_alerts: true
      news_event: true
      counter_news: true
      suite_lifecycle: true
    report:
      interval_seconds: 3600
      on_startup: true
      on_shutdown: true

news:
  enabled: false
  sources:
    rss:
      enabled: false
      feeds: []
    finnhub:
      enabled: false
      category: general
      tier: 2
    newsapi:
      enabled: false
      categories: ["business"]
      language: en
