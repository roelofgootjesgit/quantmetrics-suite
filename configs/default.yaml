# Quantbuild E1 v1 — Default Configuration

symbol: XAUUSD
timeframes:
  - 15m
  - 1h

data:
  base_path: data/market_cache
  cache_ttl_hours: 24

backtest:
  default_period_days: 60
  tp_r: 2.0
  sl_r: 1.0

risk:
  max_position_pct: 0.02
  max_daily_loss_r: 3.0

broker:
  provider: ctrader
  environment: demo
  account_id: ""
  access_token: ""
  instrument: XAUUSD
  mock_mode: true
  mock_spread: 0.2
  mock_price: 2500.0
  initial_balance: 10000

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: logs/quantbuild.log
