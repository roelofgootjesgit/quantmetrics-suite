name: quantlog-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke-gates:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run CI smoke gates
        shell: pwsh
        run: ./scripts/ci_smoke.ps1
