# Strategy test — volledige april 2026; logs & QuantLog onder strategy_tests/.
#
#   python -m src.quantbuild.app --config strategy_tests/configs/backtest_2026_04_full.yaml backtest

symbol: XAUUSD
timeframes:
  - 15m
  - 1h

data:
  base_path: data/market_cache

backtest:
  start_date: "2026-04-01"
  end_date: "2026-04-30"
  tp_r: 2.0
  sl_r: 1.0

risk:
  max_daily_loss_r: 3.0

logging:
  file_path: strategy_tests/logs/quantbuild.log

quantlog:
  enabled: true
  base_path: strategy_tests/quantlog_events
  environment: backtest

news:
  enabled: false
