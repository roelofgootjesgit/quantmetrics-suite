# STRICT_PROD_V2 — volledig kalenderjaar 2025 + vaste QuantLog-runnaam.
#
# Output: data/quantlog_events/runs/bt_2025_full_production.jsonl
#
# Fetch genoeg historie voor 2025 (15m + 1h), bv. per timeframe:
#   python -m src.quantbuild.app fetch --days 400 --timeframe 15m
#   python -m src.quantbuild.app fetch --days 400 --timeframe 1h
#
#   python -m src.quantbuild.app --config configs/backtest_named_production.yaml backtest

extends: strict_prod_v2.yaml

backtest:
  start_date: "2025-01-01"
  end_date: "2025-12-31"

quantlog:
  consolidated_run_file: true
  run_id: bt_2025_full_production
  session_id: bt_2025_full_year
