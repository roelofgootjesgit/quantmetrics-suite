# Zelfde venster als backtest_2025_full.yaml; data uit Dukascopy-cache.
#
#   python -m src.quantbuild.app --config configs/data_dukascopy_compare.yaml fetch --days 550 --source dukascopy
#   python -m src.quantbuild.app --config configs/backtest_2025_full_dukascopy.yaml backtest

symbol: XAUUSD
timeframes:
  - 15m
  - 1h

data:
  base_path: data/market_cache_dukascopy

backtest:
  start_date: "2025-01-01"
  end_date: "2025-12-31"
  tp_r: 2.0
  sl_r: 1.0

risk:
  max_daily_loss_r: 3.0

quantlog:
  enabled: true

news:
  enabled: false
