# Quantbuild E1 v1 — Default Configuration

# PRODUCTION | EDGE_DISCOVERY — see docs/2 operating modes for my XAUUSD.md
system_mode: PRODUCTION

symbol: XAUUSD
timeframes:
  - 15m
  - 1h

data:
  base_path: data/market_cache
  source: auto   # auto | ctrader | dukascopy | yfinance
  cache_ttl_hours: 24

backtest:
  default_period_days: 60
  tp_r: 2.0
  sl_r: 1.0

risk:
  max_position_pct: 0.02
  max_daily_loss_r: 3.0

broker:
  provider: ctrader
  environment: demo
  account_id: ""
  access_token: ""
  instrument: XAUUSD
  mock_mode: true
  mock_spread: 0.2
  mock_price: 2500.0
  initial_balance: 10000

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: logs/quantbuild.log
  # Per run: logs/<command>_quantbuild_<YYYY-MM-DD_HH-MM-SSZ>.log (UTC). Set false for one append-only file.
  timestamp_suffix: true

quantlog:
  enabled: true
  # When true, ``enabled: false`` raises at backtest start (official inferential runs must emit JSONL).
  inference_requires_quantlog: false
  # After backtest: run QuantAnalytics on this tree (``output_rapport/`` in quantanalytics). Off: auto_analytics: false or QUANTMETRICS_ANALYTICS_AUTO=0.
  auto_analytics: true
  # Canonical stack location — QuantAnalytics discovers <quantbuild>/data/quantlog_events by default (env QUANTMETRICS_QUANTLOG_DIR overrides).
  base_path: data/quantlog_events
  environment: dry_run
  # run_id / session_id: weglaten voor auto (nooit lege string — correlatie P1).

monitoring:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    alerts:
      trade_entry: true
      trade_exit: true
      daily_summary: true
      status_report: true
      error_alerts: true
      news_event: true
      counter_news: true
      suite_lifecycle: true
    report:
      interval_seconds: 3600
      on_startup: true
      on_shutdown: true

news:
  enabled: false
  sources:
    rss:
      enabled: false
      feeds: []
    finnhub:
      enabled: false
      category: general
      tier: 2
    newsapi:
      enabled: false
      categories: ["business"]
      language: en

# After backtest: copy consolidated QuantLog + config snapshot to quantmetrics_os/runs/ (QuantOS).
# Off by default. Set enabled: true; optional experiment_id, role: baseline|variant|single.
# Disable: artifacts.enabled: false or env QUANTMETRICS_ARTIFACTS=0
# artifacts:
#   enabled: false
#   experiment_id: null
#   role: single
#   quantmetrics_os_root: null
#   bundle_analytics: true
#   analytics_recent_seconds: 900
