name: CI

on:
  push:
    branches: [main, master, v2-development]
  pull_request:
    branches: [main, master, v2-development]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # v6 / v6 run on Node.js 24 (avoids Node 20 runner deprecation warnings)
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Suite path preflight
        run: |
          mkdir -p ../quantbridge/src ../quantlog/src/quantlog ../quantanalytics/output_rapport ../quantmetrics_os
          export QUANTMETRICS_OS_ROOT="${GITHUB_WORKSPACE}/../quantmetrics_os"
          export QUANTLOG_REPO_PATH="${GITHUB_WORKSPACE}/../quantlog"
          export QUANTBRIDGE_SRC_PATH="${GITHUB_WORKSPACE}/../quantbridge/src"
          export QUANTMETRICS_ANALYTICS_OUTPUT_DIR="${GITHUB_WORKSPACE}/../quantanalytics/output_rapport"
          python scripts/check_suite_layout.py

      - name: Block legacy v1 paths
        run: python scripts/check_no_legacy_v1_paths.py

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: QuantLog linkage (warn if QuantLog clone absent)
        run: python scripts/check_quantlog_linkage.py
